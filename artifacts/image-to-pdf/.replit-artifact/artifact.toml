kind = "web"
previewPath = "/"
title = "Image to PDF Converter"
version = "1.0.0"
id = "artifacts/image-to-pdf"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18851
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/image-to-pdf run dev"

[services.env]
PORT = "18851"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/image-to-pdf", "run", "build"]
publicDir = "artifacts/image-to-pdf/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
